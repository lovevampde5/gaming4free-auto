name: gaming4free renew (Python + Resi IP)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full pulseaudio alsa-utils ffmpeg

      - name: Setup Audio
        run: |
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Start Sing-box Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          wget -qO sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${LATEST_VERSION}/sing-box-${LATEST_VERSION#v}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box .
          chmod +x sing-box
          echo "$XRAY_CONFIG" > config.json
          
          # 后台启动代理并将日志写入 proxy.log
          ./sing-box run -c config.json > proxy.log 2>&1 &
          sleep 5
          
          # ==========================================
          # 🌟 新增：强力代理连通性探针与崩溃日志分析
          # ==========================================
          echo "正在测试代理隧道连通性..."
          PROXY_IP=$(curl -s -m 10 -x socks5://127.0.0.1:10808 https://api.ipify.org || echo "FAIL")
          
          if [ "$PROXY_IP" = "FAIL" ]; then
            echo "🚨 致命错误：代理隧道建立失败！"
            echo "可能是动态家宽 IP 已发生变动，或节点配置有误。"
            echo "👇 打印底层 Sing-box 运行日志供排查 👇"
            echo "------------------------------------------------"
            cat proxy.log
            echo "------------------------------------------------"
            exit 1
          else
            echo "💥 代理隧道畅通！当前出口 IP 为: $PROXY_IP"
          fi
          # ==========================================

      - name: Install Python Packages
        run: |
          pip install playwright pydub SpeechRecognition requests
          playwright install chrome

      - name: Run Python Script
        run: |
          mkdir -p screenshots
          xvfb-run -a python renew.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          retention-days: 1
          if-no-files-found: warn

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
