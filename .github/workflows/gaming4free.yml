name: gaming4free renew (Resi IP + Radar)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gaming4free-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps & Xray
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full pulseaudio alsa-utils ffmpeg
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Start Xray Proxy
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          mkdir -p xray-core
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          echo "$XRAY_CONFIG" > xray-core/raw_config.json
          
          # 强行注入 socks5 本地入口
          jq '.inbounds = [{"listen": "127.0.0.1", "port": 10808, "protocol": "socks", "settings": {"auth": "noauth", "udp": true}}]' xray-core/raw_config.json > xray-core/config.json
          
          # 后台启动代理
          ./xray-core/xray run -c xray-core/config.json > xray.log 2>&1 &
          echo "正在连接美国动态家宽节点..."
          sleep 3
          
          # 测试代理联通性
          PROXY_IP=$(curl -s -x socks5://127.0.0.1:10808 https://api.ipify.org || echo "代理连接失败")
          echo "💥 伪装成功！当前家宽突破 IP 为: $PROXY_IP"

      - name: Install playwright
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Run script
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          retention-days: 1
          if-no-files-found: warn

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
